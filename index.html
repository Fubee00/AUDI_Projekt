<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NFS MW - Mobile Pro V4</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
</head>
<body>

    <button id="fs-trigger">FULLSCREEN</button>

   <div class="controls-triangle">
        <div id="nos-btn" class="round-btn nos-top">NOS</div>
        <div class="controls-row">
            <div id="gear-down" class="btn-gear round-btn">−</div>
            <div id="gear-up" class="btn-gear round-btn">+</div>
        </div>
    </div>

    <div class="hud-right">
        <div class="tacho-box">
            <img src="tacho_bg.png" class="tacho-bg">
            <img src="begrenzer.png" class="redline">
            <img src="TACH_FILL_00.png" class="tacho-fill" id="tacho-fill">
            
            <img src="turbo_BAR.png" class="turbo-bar" id="turbo-bar">
            <div class="turbo-bar-fill" id="turbo-bar-fill"></div>
            <img src="needle.png" id="needle" class="nadel">
            <img src="turbo_needle.png" id="turbo-needle" class="turbo-needle">
        
        <div class="speedo-digital">
            <span id="gear-val">1</span>
            <span id="speed-val">000</span>
        </div>

        <span id="speed-unit">MPH</span>

        <div class="turbo-unit">
            <img src="turb_bg.png" class="turbo-bg-img">
            
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
